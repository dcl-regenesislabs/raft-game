name: deploy-world

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-world
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20.x
      - run: npm install
      - name: Deploy FULL game to raft.dcl.eth
        env:
          DCL_PRIVATE_KEY: ${{ secrets.DCL_PRIVATE_KEY }}
        run: npm run deploy:full
